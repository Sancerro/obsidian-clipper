			<b>Apocrypha</b> (<span class="rt-commentedText nowrap"><span class="IPA nopopups noexcerpt" lang="en-fonipa"><a href="/wiki/Help:IPA/English" title="Help:IPA/English">/<span style="border-bottom:1px dotted"><span title="/ə/: 'a' in 'about'">ə</span><span title="/ˈ/: primary stress follows">ˈ</span><span title="'p' in 'pie'">p</span><span title="/ɒ/: 'o' in 'body'">ɒ</span><span title="'k' in 'kind'">k</span><span title="'r' in 'rye'">r</span><span title="/ɪ/: 'i' in 'kit'">ɪ</span><span title="'f' in 'find'">f</span><span title="/ə/: 'a' in 'about'">ə</span></span>/</a></span></span>) are biblical or related writings not forming part of the accepted canon of scripture.
		</p>
		<p id="p2">
			In Christianity, the word <i>apocryphal</i> was first applied to writings that were to be read privately rather than in the public context of church services.
