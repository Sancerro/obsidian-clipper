<!DOCTYPE html>
<html>
<head><title>ARIA Role Table Test</title></head>
<body>
<main>
<h1>Functions</h1>
<p>Or perhaps a table:</p>
<div class="table-wrapper">
  <div role="rowgroup" class="header-group">
    <div role="row">
      <div role="columnheader">Input</div>
      <div role="columnheader">Output</div>
    </div>
  </div>
  <div role="table" class="table-body">
    <div role="rowgroup">
      <div role="row">
        <div role="cell"><p>1</p></div>
        <div role="cell"><p>2</p></div>
      </div>
      <div role="row">
        <div role="cell"><p>2</p></div>
        <div role="cell"><p>4</p></div>
      </div>
      <div role="row">
        <div role="cell"><p>3</p></div>
        <div role="cell"><p>6</p></div>
      </div>
    </div>
  </div>
</div>
<p>The table shows input and output values.</p>
</main>
</body>
</html>
